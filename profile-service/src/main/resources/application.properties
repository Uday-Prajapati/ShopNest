# Server Configuration
server.port=8082

# Application Name
spring.application.name=profile-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/shopnest_profiles?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Uday@2609
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# Logging
logging.level.com.shopnest.profile=DEBUG
logging.level.org.springframework.security=INFO

# Auth Service URL (for Feign Client)
auth.service.url=http://localhost:8081

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always