# Server Configuration
server.port=8081

# Application Name
spring.application.name=auth-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/shopnest_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Uday@2609
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2023ShopNestApp
# 24 hours in milliseconds
jwt.expiration=86400000

# Logging
logging.level.com.shopnest.auth=DEBUG
logging.level.org.springframework.security=INFO

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always