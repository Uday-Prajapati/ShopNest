# Server Configuration
server.port=8084

# Application Name
spring.application.name=product-service

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=shopnest_products
spring.data.mongodb.auto-index-creation=true

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# Logging
logging.level.com.shopnest.product=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# File upload (for product images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT secret (must match auth-service and api-gateway)
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2023ShopNestApp