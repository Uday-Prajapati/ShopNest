# Server Configuration
# changed to 8081 because port 8080 is already in use on this machine
server.port=8080

# Application Name
spring.application.name=api-gateway

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT Secret (MUST match with auth-service)
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2023ShopNestApp

# Gateway Routes Configuration
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

#
# IMPORTANT:
# Routes are configured in code via `com.shopnest.api_gateway.config.RouteConfig`
# so that the AuthenticationFilter runs and forwards X-Auth-Username / X-User-Roles
# headers to downstream services for role-based access control.
# Do NOT duplicate route definitions here, otherwise requests may bypass the filter.

# Logging
logging.level.com.shopnest.apigateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO

# Management / Actuator
# expose common endpoints so /actuator/info is available
management.endpoints.web.exposure.include=health,info,metrics,env,beans,loggers,threaddump
management.endpoint.health.show-details=always

# Info endpoint content (basic)
info.app.name=${spring.application.name}
info.app.description=API Gateway for ShopNest
info.app.version=0.0.1-SNAPSHOT